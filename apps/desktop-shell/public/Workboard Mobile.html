<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eclipse OS — Workboard · mobile</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="apple-touch-icon" href="assets/favicon-180.png">

<!-- Shared theme bootstrap — stamps data-theme / data-appearance / data-motion
     on <html> before paint. Same file as every other surface. -->
<script src="theme-boot.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Fragment+Mono&display=swap" rel="stylesheet">
<!-- styles.css = flat design-system entry point (canonical tokens). -->
<link rel="stylesheet" href="styles.css">
<!-- shared pocket chrome: device frame, seg pill, sheets-as-Dialog-Mats, toast -->
<link rel="stylesheet" href="mobile-shell.css">
<link rel="stylesheet" href="workboard/wb-mobile.css">
</head>
<body>

<div class="app" id="wbmApp" data-screen-label="Workboard — mobile">

  <!-- status bar (hardware mockup chrome) -->
  <div class="statusbar">
    <div class="island"></div>
    <div class="sb-l"><span class="time">9:41</span></div>
    <div class="sb-r">
      <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7.5" width="3" height="4.5" rx="0.7"></rect><rect x="4.5" y="5" width="3" height="7" rx="0.7"></rect><rect x="9" y="2.5" width="3" height="9.5" rx="0.7"></rect><rect x="13.5" y="0" width="3" height="12" rx="0.7"></rect></svg>
      <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z"></path><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z"></path><circle cx="8.5" cy="10.5" r="1.5"></circle></svg>
      <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-opacity="0.4" fill="none"></rect><rect x="2" y="2" width="18" height="9" rx="2"></rect><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill-opacity="0.4"></path></svg>
    </div>
  </div>

  <!-- header -->
  <header class="m-top">
    <a class="m-back" href="EclipseOSMobile.html" aria-label="Back to shared-brain">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 4.6 4.4 8.8l5.1 4.2"/><path d="M4.4 8.8h9.1a6.1 6.1 0 0 1 0 12.2H8.4"/></svg>
    </a>
    <div class="m-top-main">
      <h1 class="m-h1">Workboard</h1>
      <div class="m-sub wbm-sub" id="wbmSub"></div>
    </div>
    <button class="m-iconbtn" id="wbmDispatch" aria-label="Dispatch ready work">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.4 12a7.6 7.6 0 0 1 13-5.4L19.9 9"/><path d="M20 4.4V9h-4.6"/><path d="M19.6 12a7.6 7.6 0 0 1-13 5.4L4.1 15"/><path d="M4 19.6V15h4.6"/></svg>
    </button>
    <button class="m-iconbtn" id="wbmBell" aria-label="Notifications"></button>
  </header>

  <!-- board switcher + view seg -->
  <div class="wbm-boardrow">
    <button class="wbm-switch" id="wbmSwitch" aria-haspopup="dialog"></button>
    <div class="m-seg" id="wbmView" role="tablist" aria-label="View">
      <span class="m-seg-thumb" aria-hidden="true"></span>
      <button class="m-seg-tab on" data-view="board" title="Board view" aria-label="Board view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4.8" y="4.4" width="4.6" height="15.2" rx="1.8"/><rect x="14.6" y="4.4" width="4.6" height="15.2" rx="1.8"/></svg>
      </button>
      <button class="m-seg-tab" data-view="list" title="List view" aria-label="List view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.4 6.4h15.2"/><path d="M4.4 12h15.2"/><path d="M4.4 17.6h15.2"/></svg>
      </button>
    </div>
  </div>

  <!-- search + filters -->
  <div class="wbm-tools">
    <label class="m-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11.2" cy="11.2" r="7"/><path d="m16.4 16.4 4.2 4.2"/></svg>
      <input id="wbmSearch" type="text" placeholder="Search cards" autocomplete="off" spellcheck="false">
    </label>
    <nav class="m-chips" id="wbmFilters" aria-label="Filters"></nav>
  </div>

  <!-- lane strip (board view) -->
  <nav class="wbm-lanes" id="wbmLanes" aria-label="Lanes"></nav>

  <!-- lane pager (board view) -->
  <main class="wbm-pager" id="wbmPager"></main>

  <!-- list view -->
  <main class="wbm-list" id="wbmList" hidden></main>

  <!-- new card -->
  <button class="m-fab" id="wbmFab" aria-label="New card"></button>

  <!-- sheets -->
  <div class="m-scrim" id="wbmScrim"></div>
  <section class="m-sheet" id="wbmSheet" role="dialog" aria-modal="true" data-screen-label="Workboard sheet"></section>

  <div class="m-toast" id="wbmToast" role="status"></div>
</div>

<!-- desktop workboard module — loaded for WB_CORE (seed data + status model +
     card vocabulary); it bails before any desktop wiring because
     #workboardView is absent. -->
<script src="workboard/workboard.js"></script>
<script src="mobile-shell.js"></script>
<script src="workboard/wb-mobile.js"></script>

</body>
</html>
